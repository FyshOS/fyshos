# The initrd is stored uncompressed on the ISO, so this comes straight off the
# image size. Set it here rather than via LB_INITRAMFS_COMPRESSION: that option
# only offers gzip/bzip2/lzma, and it implements them by piping the finished
# initrd through zcat, which no longer works now that initramfs-tools defaults
# to zstd.
COMPRESS=xz
