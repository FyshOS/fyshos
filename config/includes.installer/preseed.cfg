# Without a root user installer will configure sudo instead
d-i passwd/root-login boolean false

# Use any network that is up
d-i netcfg/choose_interface select auto

# Turn on dhcp network detection
d-i netcfg/disable_autoconfig boolean false

# prevent network domain question
d-i netcfg/get_domain string unassigned-domain

# The systemd unit of the same name keeps this applied after grub-efi upgrades,
# but the first boot of the installed system happens before it ever runs.
d-i preseed/late_command string in-target /usr/local/sbin/fyshos-fix-esp-grub || true
